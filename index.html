<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de Colores</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="encabezado">
        <h1 id="titulo-h1">GENERADOR DE PALETAS</h1>
    </header>

    <main>
        <section>
            <div class="contenedor">
                <article>
                    <ul id="instrucciones">
                        <li><span>Paso 1</span> Selecciona la cantidad de colores.</li>
                        <li><span>Paso 2</span> Haz click en el botón "Generar nueva paleta".</li>
                        <li><span>Paso 3</span> Sigue probando combinaciones aleatorias.</li>
                    </ul>
                </article>
            </div>

            <div class="contenedor" id="seleccion">
                <article>
                    <div id="seleccion-colores">
                        <h2>Seleccioná la cantidad de colores</h2>

                        <label class="opcion">
                            <input type="checkbox" value="6">
                            6 colores
                        </label>

                        <label class="opcion">
                            <input type="checkbox" value="8">
                            8 colores
                        </label>

                        <label class="opcion">
                            <input type="checkbox" value="9">
                            9 colores
                        </label>

                        <p id="feedback">Todavía no seleccionaste ninguna opción.</p>

                    </div>

                    <div id="boton-generar">
                        <button id="generar-paleta">Generar nueva paleta</button>
                    </div>

                </article>

                <div id="contenedor-paleta">    
                    <article class="paleta" class="oculto">

                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        <div class="oculto"></div>
                        
                    </article>

                    <div id="formatos-color">
                        <div id="opciones-formato">
                            <label>
                                <input type="radio" name="formato" value="hex" checked>
                                HEX
                            </label>

                            <label>
                                <input type="radio" name="formato" value="hsl">
                                HSL
                            </label>

                            <label>
                                <input type="radio" name="formato" value="rgba">
                                RGBA
                            </label>
                        </div>

                        <p id="feedback-formato">Formato seleccionado: HEX</p>
                    </div>

                </div>
            
            </div>
        </section>
    </main>
    
    <script src="./script/script.js"></script>
</body>
</html>
